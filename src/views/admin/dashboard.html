<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Users - Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/public/css/admin.css">
  <script src="/public/js/admin.js" defer></script>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800">
  <!-- Navigation -->
  <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex items-center gap-3">
          <div class="bg-blue-600 p-2 rounded-lg">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z">
              </path>
            </svg>
          </div>
          <h1 class="text-xl font-bold text-slate-900 tracking-tight">Admin<span class="text-blue-600">Dashboard</span>
          </h1>
        </div>
        <div class="flex items-center gap-4">
          <div class="hidden sm:block text-sm font-medium text-slate-600">
            Welcome, {{adminUsername}}
          </div>
          <a href="/logout"
            class="px-4 py-2 rounded-lg text-sm font-semibold text-rose-600 hover:bg-rose-50 border border-transparent hover:border-rose-200 transition-all duration-200">
            Sign out
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
    <div class="mb-6 flex items-center justify-between">
      <div>
        <h2 class="text-2xl font-bold text-slate-900">Registered Users</h2>
        <p class="mt-1 text-sm text-slate-500">A complete list of all users active and locked in the platform.</p>
      </div>
      <div class="bg-white rounded-lg border border-slate-200 px-4 py-2 shadow-sm">
        <span class="text-sm font-medium text-slate-500">Total:</span>
        <span class="ml-2 text-lg font-bold text-blue-600">{{totalUsers}}</span>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white shadow-sm rounded-xl border border-slate-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-50">
            <tr>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                User</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                Email Address</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                Status</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">
                Role</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-200 bg-white">
            {{tableRows}}
          </tbody>
        </table>
        {{emptyState}}
      </div>
    </div>
  </main>
</body>

</html>
