<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Core Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/public/css/admin.css">
  <script defer src='https://analytics.deplio.app/script.js' data-website-id='f427a9d0-6a4e-4cd9-82c2-b9aba05f404c'
    data-performance='true' data-do-not-track='true' data-domains='server-elysia.onrender.com'></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>

<body class="font-sans antialiased text-slate-800 selection:bg-primary-100 selection:text-primary-900 bg-slate-50">

  <!-- Ambient Animated Background -->
  <div class="ambient-bg">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
  </div>

  <!-- Navigation -->
  <nav class="glass sticky top-0 z-50 border-b border-white/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-18 py-3">
        <div class="flex items-center gap-4 group cursor-default">
          <div
            class="bg-primary-500 p-2.5 rounded-xl text-white shadow-sm shadow-primary-500/20 group-hover:bg-primary-600 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />
            </svg>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-tight text-slate-900">
              Admin<span class="text-primary-500">Portal</span>
            </h1>
            <p class="text-xs font-medium text-slate-500">System Management</p>
          </div>
        </div>

        <div class="flex items-center gap-6">
          <div class="hidden sm:flex flex-col items-end">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Logged in as</span>
            <span class="text-sm font-bold text-slate-700 flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 ring-2 ring-emerald-100"></span>
              {{adminUsername}}
            </span>
          </div>
          <div class="h-8 w-px bg-slate-200 hidden sm:block"></div>
          <a href="/logout"
            class="px-4 py-2 rounded-xl text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-50 hover:text-rose-600 hover:border-rose-200 transition-all shadow-sm">
            Sign out
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 relative z-10 fade-in">

    <!-- Header Section -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-6">
      <div>
        <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Users Directory</h2>
        <p class="mt-1.5 text-sm text-slate-500 font-medium">Manage all platform users, roles, and access statuses.</p>
      </div>

      <div class="glass px-6 py-3 rounded-2xl flex items-center gap-4 shadow-sm border-white/60">
        <span class="text-sm font-semibold text-slate-500">Total Users</span>
        <div class="h-6 w-px bg-slate-200"></div>
        <span class="text-2xl font-bold text-primary-600">{{totalUsers}}</span>
      </div>
    </div>

    <!-- Table Container -->
    <div class="glass rounded-3xl overflow-hidden shadow-sm border border-white/60">
      <div class="overflow-x-auto">
        <table class="min-w-full text-sm text-left">
          <thead class="bg-slate-50/50 border-b border-slate-100">
            <tr>
              <th scope="col" class="px-6 py-4 font-bold text-xs text-slate-500 uppercase tracking-wider">
                User Details
              </th>
              <th scope="col" class="px-6 py-4 font-bold text-xs text-slate-500 uppercase tracking-wider">
                Email Address
              </th>
              <th scope="col" class="px-6 py-4 font-bold text-xs text-slate-500 uppercase tracking-wider">
                Status
              </th>
              <th scope="col" class="px-6 py-4 font-bold text-xs text-slate-500 uppercase tracking-wider">
                Role
              </th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100/60 bg-white/40">
            {{tableRows}}
          </tbody>
        </table>

        <!-- Empty State Container -->
        {{emptyState}}
      </div>
    </div>

  </main>

  <script src="/public/js/admin.js" defer></script>
</body>

</html>
