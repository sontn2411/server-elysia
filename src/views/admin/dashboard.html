<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Core Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Using Google Fonts for Tech Vibe -->
  <link
    href="https://fonts.googleapis.com/css2?family=Exo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="/public/css/admin.css">

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Space Grotesk', 'sans-serif'],
            exo: ['Exo', 'sans-serif'],
            mono: ['Roboto Mono', 'monospace'],
          },
          colors: {
            cyber: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#0ea5e9', // using sky blue for tech vibe matching admin.css
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
              950: '#082f49',
            }
          },
          animation: {
            'glow-pulse': 'glow-pulse 3s ease-in-out infinite alternate',
          },
          keyframes: {
            'glow-pulse': {
              '0%': { opacity: 0.2, transform: 'scale(1)' },
              '100%': { opacity: 0.4, transform: 'scale(1.05)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #020617;
      /* slate-950 */
      color: #e2e8f0;
      overflow-x: hidden;
    }

    /* Dynamic Cyber Background */
    .cyber-grid {
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image:
        linear-gradient(to right, rgba(14, 165, 233, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(14, 165, 233, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: linear-gradient(to bottom, black 80%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent);
      transform: perspective(600px) rotateX(30deg) scale(1.5) translateY(-5%);
      transform-origin: center top;
      animation: grid-move 20s linear infinite;
    }

    @keyframes grid-move {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 0 50px;
      }
    }

    .cyber-glow {
      position: fixed;
      top: 0%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1000px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(14, 165, 233, 0.12) 0%, rgba(2, 6, 23, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    /* Glassmorphism Components */
    .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(14, 165, 233, 0.2);
    }

    .glass-nav {
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(14, 165, 233, 0.3);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
    }

    .glass-card {
      background: rgba(30, 41, 59, 0.4);
      border: 1px solid rgba(14, 165, 233, 0.15);
      backdrop-filter: blur(10px);
    }

    /* Table Styles */
    .cyber-table-container {
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.7);
    }

    .cyber-table th {
      background: rgba(14, 165, 233, 0.1);
      border-bottom: 2px solid rgba(14, 165, 233, 0.4);
      color: #7dd3fc;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Roboto Mono', monospace;
    }

    .cyber-table tbody tr {
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
      background: rgba(15, 23, 42, 0.4);
    }

    .cyber-table tbody tr:hover {
      background: rgba(14, 165, 233, 0.05);
      border-left: 2px solid #0ea5e9;
      box-shadow: inset 20px 0 20px -20px rgba(14, 165, 233, 0.3);
    }

    .cyber-table td {
      padding: 1rem 1.5rem;
      font-family: 'Space Grotesk', sans-serif;
      color: #cbd5e1;
    }

    .cyber-table td:first-child {
      font-family: 'Roboto Mono', monospace;
      color: #bae6fd;
    }

    /* Badges & Stats */
    .stat-badge {
      position: relative;
      overflow: hidden;
      background: rgba(2, 6, 23, 0.8);
      border: 1px solid rgba(14, 165, 233, 0.4);
      box-shadow: 0 0 15px rgba(14, 165, 233, 0.1);
    }

    .stat-badge::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(to right, transparent, rgba(14, 165, 233, 0.2), transparent);
      transform: skewX(-20deg);
      animation: shine 4s infinite;
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      20% {
        left: 200%;
      }

      100% {
        left: 200%;
      }
    }

    .cyber-btn-outline {
      border: 1px solid #ef4444;
      /* rose-500 */
      color: #ef4444;
      background: rgba(225, 29, 72, 0.05);
      transition: all 0.3s ease;
      font-family: 'Roboto Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cyber-btn-outline:hover {
      background: rgba(225, 29, 72, 0.15);
      color: #fca5a5;
      box-shadow: 0 0 15px rgba(225, 29, 72, 0.3);
      border-color: #f87171;
    }
  </style>
</head>

<body class="font-sans antialiased text-slate-300 selection:bg-cyber-500 selection:text-slate-950">

  <!-- Dynamic Backgrounds -->
  <div class="cyber-grid"></div>
  <div class="cyber-glow animate-glow-pulse"></div>

  <!-- Navigation -->
  <nav class="glass-nav sticky top-0 z-50 transition-all">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-18 py-3">
        <div class="flex items-center gap-4 group">
          <div class="relative">
            <div
              class="absolute inset-0 bg-cyber-500 blur-md opacity-40 group-hover:opacity-70 transition-opacity rounded-lg">
            </div>
            <div
              class="relative bg-slate-900 border border-cyber-500/50 p-2.5 rounded-lg flex items-center justify-center group-hover:bg-slate-800 transition-colors">
              <svg class="w-6 h-6 text-cyber-400 group-hover:text-cyber-300 transition-colors" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
              </svg>
            </div>
          </div>
          <div>
            <h1 class="text-xl font-bold tracking-tight font-exo drop-shadow-md">
              <span class="text-white">SYS_ADMIN</span><span class="text-cyber-500">::PORTAL</span>
            </h1>
            <p class="text-[10px] font-mono text-cyber-400/70 tracking-widest uppercase">Node Security Active</p>
          </div>
        </div>
        <div class="flex items-center gap-5">
          <div class="hidden sm:flex flex-col items-end">
            <span class="text-xs font-mono text-slate-400 uppercase tracking-widest">Op_Comm</span>
            <span class="text-sm font-medium text-cyber-300 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399] animate-pulse"></span>
              {{adminUsername}}
            </span>
          </div>
          <div class="h-8 w-px bg-slate-700/50 mx-2 hidden sm:block"></div>
          <a href="/logout"
            class="cyber-btn-outline px-5 py-2.5 rounded-lg text-xs font-bold transition-all duration-300 flex items-center gap-2 group cursor-pointer text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"
              fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
            <span>Terminate</span>
          </a>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8 relative z-10">

    <!-- Header Section -->
    <div class="mb-8 flex flex-col sm:flex-row sm:items-end justify-between gap-6">
      <div class="relative">
        <div class="flex items-center gap-3 mb-1">
          <span class="text-cyber-500 font-mono font-bold animate-pulse">>_</span>
          <h2 class="text-2xl font-bold text-white font-exo tracking-wide">Entity Directory</h2>
        </div>
        <p class="mt-1 text-sm text-slate-400 font-mono">Index of registered users and system access privileges.</p>
        <!-- decorative line -->
        <div class="absolute -bottom-4 left-0 w-2/3 h-px bg-gradient-to-r from-cyber-500 to-transparent"></div>
      </div>

      <div class="stat-badge rounded-lg px-6 py-3 flex items-center gap-4">
        <span class="text-xs font-mono text-slate-400 uppercase tracking-widest">Total_Entities</span>
        <div class="h-6 w-px bg-slate-700"></div>
        <span
          class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyber-400 to-cyber-200">{{totalUsers}}</span>
      </div>
    </div>

    <!-- Table Container -->
    <div class="glass-panel cyber-table-container rounded-xl overflow-hidden relative mt-8">
      <!-- Decorator corners -->
      <div
        class="absolute top-0 left-0 w-16 h-16 border-t-2 border-l-2 border-cyber-500/50 rounded-tl-xl pointer-events-none">
      </div>
      <div
        class="absolute top-0 right-0 w-16 h-16 border-t-2 border-r-2 border-cyber-500/50 rounded-tr-xl pointer-events-none">
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full cyber-table text-sm text-left whitespace-nowrap">
          <thead>
            <tr>
              <th scope="col" class="px-6 py-4 font-semibold text-xs rounded-tl-lg">
                <div class="flex items-center gap-2"><span class="text-cyber-500 opacity-50">#</span> User_ID</div>
              </th>
              <th scope="col" class="px-6 py-4 font-semibold text-xs">
                Comm_Link (Email)
              </th>
              <th scope="col" class="px-6 py-4 font-semibold text-xs">
                Status
              </th>
              <th scope="col" class="px-6 py-4 font-semibold text-xs rounded-tr-lg">
                Clearance
              </th>
            </tr>
          </thead>
          <tbody>
            {{tableRows}}
          </tbody>
        </table>

        <!-- Empty State Container (rendered by backend if no rows) -->
        {{emptyState}}
      </div>

      <!-- footer decorator -->
      <div class="h-1 w-full bg-gradient-to-r from-transparent via-cyber-500/50 to-transparent"></div>
    </div>
  </main>

  <script src="/public/js/admin.js" defer></script>
</body>

</html>
