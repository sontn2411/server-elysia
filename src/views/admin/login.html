<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/public/css/admin.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
</head>

<body
  class="flex items-center justify-center min-h-screen font-sans antialiased text-slate-800 selection:bg-primary-100 selection:text-primary-900">

  <!-- Ambient Animated Background -->
  <div class="ambient-bg">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
  </div>

  <!-- Login Card container -->
  <div
    class="relative w-full max-w-[420px] p-8 sm:p-10 glass rounded-3xl z-10 fade-in m-4 shadow-[0_8px_30px_rgb(0,0,0,0.04)] ring-1 ring-white/60">

    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white shadow-sm ring-1 ring-slate-100 mb-6 text-primary-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-slate-900 tracking-tight">Welcome back</h2>
      <p class="text-slate-500 mt-2 text-sm">Please enter your details to sign in.</p>
    </div>

    <!-- Error message slot -->
    {{errorMsg}}

    <form action="/login" method="POST" class="space-y-6">

      <!-- Identity Input -->
      <div class="space-y-2">
        <label class="block text-slate-700 text-sm font-semibold" for="identity">
          Email address
        </label>
        <div class="relative">
          <input class="w-full px-4 py-3.5 rounded-xl modern-input text-sm text-slate-800 placeholder-slate-400"
            id="identity" name="identity" type="text" placeholder="name@company.com" required autocomplete="off">
          <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
          </div>
        </div>
      </div>

      <!-- Password Input -->
      <div class="space-y-2 mt-5">
        <label class="block text-slate-700 text-sm font-semibold" for="password">
          Password
        </label>
        <div class="relative">
          <input class="w-full px-4 py-3.5 rounded-xl modern-input text-sm text-slate-800 placeholder-slate-400"
            id="password" name="password" type="password" placeholder="••••••••" required>
          <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
              xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
              </path>
            </svg>
          </div>
        </div>
      </div>

      <!-- Action Button -->
      <div class="pt-4">
        <button class="w-full modern-btn py-3.5 px-4 rounded-xl text-sm flex items-center justify-center gap-2"
          type="submit">
          <span>Sign in to account</span>
        </button>
      </div>

    </form>
  </div>
</body>

</html>
